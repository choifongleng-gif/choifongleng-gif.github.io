<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>隨機問答·二十題（自動顯示答案）</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            font-family: 'Segoe UI', 'Roboto', sans-serif;
        }
        body {
            background: #2c3e50;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }
        .card {
            background: #ecf0f3;
            border-radius: 50px;
            box-shadow: 20px 20px 35px #1e2b36, -10px -10px 25px #ffffff30;
            width: 100%;
            max-width: 780px;
            padding: 32px 28px;
            transition: all 0.2s;
        }
        .top-bar {
            display: flex;
            justify-content: space-between;
            background: #d4e0e8;
            border-radius: 60px;
            padding: 14px 28px;
            margin-bottom: 30px;
            box-shadow: inset 0 2px 8px #a6b9c7, 0 8px 0 #7a8e9f;
            font-weight: 600;
            color: #1f3a4b;
        }
        .score {
            background: #f5c542;
            padding: 6px 32px;
            border-radius: 40px;
            font-size: 1.7rem;
            box-shadow: 0 5px 0 #b57c2a;
        }
        .remaining {
            background: #4b6a84;
            padding: 6px 30px;
            border-radius: 40px;
            color: white;
            font-size: 1.3rem;
        }
        .question-box {
            background: white;
            border-radius: 60px;
            padding: 36px 28px;
            box-shadow: inset 0 -4px 0 #c0d0dd, 0 15px 25px #1a2a33;
            border: 1px solid #f0f9ff;
            margin-bottom: 24px;
        }
        .q-text {
            font-size: 1.9rem;
            font-weight: 600;
            color: #002b4a;
            padding-left: 20px;
            border-left: 10px solid #f39c12;
            margin-bottom: 28px;
            word-break: break-word;
        }
        .options {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .option {
            background: #eef5fa;
            border: 3px solid #b7cfdd;
            border-radius: 50px;
            padding: 18px 26px;
            font-size: 1.4rem;
            font-weight: 550;
            color: #10354b;
            cursor: pointer;
            box-shadow: 0 7px 0 #8faabb;
            transition: all 0.1s;
            display: flex;
            align-items: center;
        }
        .option:hover:not(.locked) {
            background: #ddeeff;
            transform: translateY(-2px);
            box-shadow: 0 9px 0 #7f98ab;
        }
        .prefix {
            background: #c1dcee;
            border-radius: 40px;
            width: 48px;
            height: 48px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-right: 22px;
            font-weight: 700;
            font-size: 1.6rem;
            border: 2px solid white;
        }
        .correct-highlight {
            background: #a5d6a5 !important;
            border-color: #2b6c2b !important;
            box-shadow: 0 4px 0 #1b4f1b !important;
            color: #153015;
        }
        .wrong-highlight {
            background: #f4acac !important;
            border-color: #b33f3f !important;
            box-shadow: 0 4px 0 #7f2c2c !important;
            color: #4d1e1e;
        }
        .locked {
            pointer-events: none;
            opacity: 0.9;
        }
        .feedback-area {
            margin-top: 28px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #d6e3ed;
            border-radius: 50px;
            padding: 12px 20px 12px 30px;
        }
        .answer-hint {
            font-size: 1.4rem;
            font-weight: 600;
            color: #13415a;
        }
        .next-btn {
            background: #f0b345;
            border: none;
            border-radius: 60px;
            padding: 14px 44px;
            font-size: 1.6rem;
            font-weight: 700;
            box-shadow: 0 7px 0 #b16219;
            cursor: pointer;
            transition: 0.05s linear;
            border: 1px solid #ffe28b;
            color: #232013;
        }
        .next-btn:active {
            transform: translateY(5px);
            box-shadow: 0 2px 0 #b16219;
        }
        .next-btn.hidden {
            display: none;
        }
        .restart-btn {
            background: #cbdae6;
            border: none;
            border-radius: 40px;
            padding: 12px 36px;
            font-size: 1.3rem;
            font-weight: 600;
            box-shadow: 0 6px 0 #7a8d9e;
            cursor: pointer;
            transition: 0.08s;
            color: #1f3d54;
            margin-top: 20px;
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
        }
        .restart-btn:active {
            transform: translateY(5px);
            box-shadow: 0 1px 0 #6c8195;
        }
        .finish-panel {
            background: #c9e9e4;
            border-radius: 60px;
            padding: 50px 30px;
            text-align: center;
            box-shadow: 0 12px 0 #519b92;
            border: 2px solid #c3fff5;
        }
        .finish-score {
            font-size: 3rem;
            font-weight: 800;
            color: #004d40;
            margin: 20px 0;
        }
        .gray-bg {
            background: #f4f9ff;
        }
    </style>
</head>
<body>
    <div class="card" id="appContainer">
        <!-- 動態渲染 -->
    </div>

    <script>
        (function() {
            // ----- 更新後的題庫 (依照最新提問) -----
            const questions = [
                { q: "以下哪一項不是火藥的用途？", options: ["A. 製造煙花", "B. 煮食", "C. 開闢土地", "D. 製造武器"], answer: "B", multi: false },
                { q: "誰是中國歷史上的第一位皇帝？", options: ["A. 禹", "B. 孫中山", "C. 秦始皇", "D. 啟"], answer: "C", multi: false },
                { q: "誰建立了中國歷史上第一個朝代？", options: ["A. 禹", "B. 孫中山", "C. 秦始皇", "D. 啟"], answer: "A", multi: false },
                { q: "誰成功治水，成為傳說中的治水英雄？", options: ["A. 禹", "B. 孫中山", "C. 秦始皇", "D. 啟"], answer: "A", multi: false },
                { q: "誰結束了中國長期的皇帝統治？", options: ["A. 禹", "B. 孫中山", "C. 秦始皇", "D. 啟"], answer: "B", multi: false },
                { q: "誰改良造紙術？", options: ["A. 畢昇", "B. 張衡", "C. 扁鵲", "D. 蔡倫"], answer: "D", multi: false },
                { q: "誰被後世尊為「醫神」？", options: ["A. 畢昇", "B. 張衡", "C. 扁鵲", "D. 蔡倫"], answer: "C", multi: false },
                { q: "誰發明了活字印刷術？", options: ["A. 畢昇", "B. 張衡", "C. 扁鵲", "D. 蔡倫"], answer: "A", multi: false },
                { q: "誰發明了地動儀和渾天儀？", options: ["A. 畢昇", "B. 張衡", "C. 扁鵲", "D. 蔡倫"], answer: "B", multi: false },
                { q: "以下哪一項不是中醫「四診」的方法？", options: ["A. 望", "B. 打針", "C. 把脈", "D. 聞"], answer: "B", multi: false },
                { q: "乾電池分為哪兩種極？（可選多於一個答案）", options: ["A. 南極", "B. 北極", "C. 正極", "D. 負極"], answer: ["C","D"], multi: true },
                { q: "誰被後世尊為「工匠祖師」？", options: ["A. 蚩尤", "B. 張衡", "C. 扁鵲", "D. 魯班"], answer: "D", multi: false },
                { q: "以下哪些是魯班的發明？（可選多於一個答案）", options: ["A. 指南針", "B. 鋸子", "C. 火藥", "D. 傘"], answer: ["B","D"], multi: true },
                { q: "以下哪些物品會被磁鐵吸引？（可選多於一個答案）", options: ["A. 鐵尺", "B. 木筷子", "C. 曲別針", "D. 書"], answer: ["A","C"], multi: true },  // 鐵尺、曲別針
                { q: "以下哪一項屬於靜態的個人活動？", options: ["A. 踢足球", "B. 畫畫", "C. 跑步", "D. 捉迷藏"], answer: "B", multi: false },
                { q: "以下哪一項屬於動態的群體活動？", options: ["A. 唱歌", "B. 騎單車", "C. 下棋", "D. 打羽毛球"], answer: "D", multi: false },
                { q: "以下哪一項活動最能有助於增長知識？", options: ["A. 畫畫", "B. 下棋", "C. 看書", "D. 打籃球"], answer: "C", multi: false },
                { q: "以下哪些是五千多年前中國先民生活的正確描述？（可選多於一個答案）", options: ["A. 會打獵", "B. 不穿衣服", "C. 住在山洞", "D. 會畜牧"], answer: ["A","C","D"], multi: true },
                { q: "以下哪一項活動最能訓練思考能力？", options: ["A. 畫畫", "B. 下棋", "C. 看書", "D. 打籃球"], answer: "B", multi: false },
                { q: "以下哪一項活動最能發揮創意？", options: ["A. 畫畫", "B. 下棋", "C. 看書", "D. 打籃球"], answer: "A", multi: false }
            ];

            // 狀態變數
            let remainingIndices = [];            // 未出題號 (隨機順序)
            let currentIdx = null;                 // 當前顯示題目在questions的索引
            let score = 0;
            let answered = false;                   // 本題是否已經答過 (鎖定)
            let selectedOptions = new Set();         // 多選暫存
            let multiCorrectAnswers = [];

            const container = document.getElementById('appContainer');

            // 打亂陣列
            function shuffle(arr) {
                for (let i = arr.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [arr[i], arr[j]] = [arr[j], arr[i]];
                }
                return arr;
            }

            // 初始化剩餘題號 (隨機)
            function resetRemaining() {
                remainingIndices = questions.map((_, idx) => idx);
                remainingIndices = shuffle(remainingIndices);
            }

            // 取得下一題 (若完成回傳null)
            function getNext() {
                if (remainingIndices.length === 0) return null;
                return remainingIndices.shift();
            }

            // 重新開始遊戲
            function restart() {
                resetRemaining();
                score = 0;
                const next = getNext();
                if (next !== null) {
                    currentIdx = next;
                    renderQuestion(currentIdx);
                } else {
                    renderFinish();
                }
            }

            // 完成後顯示總分
            function renderFinish() {
                const totalPossible = questions.length * 5;
                container.innerHTML = `
                    <div class="top-bar" style="justify-content:center; background:#e0dbb8;">
                        <span class="score" style="background:#9ea9b5; color:white;">🏁 完成</span>
                    </div>
                    <div class="finish-panel">
                        <div style="font-size:2.2rem;">🎉 你完成了所有題目！</div>
                        <div class="finish-score">🏆 ${score} / ${totalPossible} 分</div>
                        <button class="restart-btn" id="restartFinishBtn" style="background:#f5e56b;">📋 再玩一次</button>
                    </div>
                `;
                document.getElementById('restartFinishBtn').addEventListener('click', restart);
            }

            // 顯示正確答案文字 (用於反饋區)
            function getAnswerDisplay(q) {
                if (!q.multi) {
                    // 單選: 找到對應字母的完整選項文字
                    const ansLetter = q.answer;
                    const opt = q.options.find(opt => opt.startsWith(ansLetter));
                    return `✅ 正確答案：${opt}`;
                } else {
                    // 多選: 取出所有正確選項合併
                    const correctOpts = q.options.filter(opt => q.answer.includes(opt.charAt(0)));
                    return `✅ 正確答案：${correctOpts.join('、')}`;
                }
            }

            // 處理單選點擊
            function handleSingleClick(letter, optElement, q) {
                if (answered) return;
                const isCorrect = (letter === q.answer);
                if (isCorrect) score += 5;
                answered = true;

                // 高亮所有選項: 正確答案綠色，錯誤選中的變紅 (如果選錯)
                const allOpts = document.querySelectorAll('.option');
                allOpts.forEach(opt => {
                    const l = opt.dataset.letter;
                    if (l === q.answer) opt.classList.add('correct-highlight');
                    else if (l === letter && !isCorrect) opt.classList.add('wrong-highlight');
                    opt.classList.add('locked');
                });

                // 更新反饋訊息，顯示正確答案
                const hintDiv = document.getElementById('answerHint');
                hintDiv.innerText = getAnswerDisplay(q);

                // 顯示下一題按鈕
                document.getElementById('nextBtn').classList.remove('hidden');
            }

            // 多選: 點擊選項(暫存)
            function handleMultiClick(letter, optElement, q) {
                if (answered) return;
                if (selectedOptions.has(letter)) {
                    selectedOptions.delete(letter);
                    optElement.style.background = '';
                    optElement.style.borderColor = '';
                } else {
                    selectedOptions.add(letter);
                    optElement.style.background = '#f9e1a4';
                    optElement.style.borderColor = '#c49b3f';
                }
            }

            // 多選提交
            function submitMulti(q) {
                if (answered) return;
                const correctSet = new Set(q.answer);   // 例如 {'C','D'}
                let isCorrect = false;
                if (selectedOptions.size === correctSet.size) {
                    let allMatch = true;
                    for (let s of selectedOptions) {
                        if (!correctSet.has(s)) { allMatch = false; break; }
                    }
                    isCorrect = allMatch;
                }
                if (isCorrect) score += 5;
                answered = true;

                // 高亮所有選項
                const allOpts = document.querySelectorAll('.option');
                allOpts.forEach(opt => {
                    const l = opt.dataset.letter;
                    if (correctSet.has(l)) opt.classList.add('correct-highlight');
                    else if (selectedOptions.has(l) && !correctSet.has(l)) opt.classList.add('wrong-highlight');
                    opt.classList.add('locked');
                    opt.style.background = ''; // 清除暫存色
                });

                document.getElementById('answerHint').innerText = getAnswerDisplay(q);
                document.getElementById('nextBtn').classList.remove('hidden');
                document.getElementById('submitMultiBtn').style.display = 'none'; // 隱藏提交鍵
            }

            // 渲染題目
            function renderQuestion(idx) {
                const q = questions[idx];
                // 重置狀態
                answered = false;
                selectedOptions.clear();

                // 製作選項HTML
                let optsHtml = '';
                q.options.forEach(opt => {
                    const letter = opt.charAt(0);
                    optsHtml += `<div class="option" data-letter="${letter}"><span class="prefix">${letter}</span>${opt.substring(2)}</div>`;
                });

                // 依照是否多選決定額外按鈕
                const multiSubmitHtml = q.multi ? `<button class="next-btn" id="submitMultiBtn" style="margin-right:15px; padding:12px 28px;">✔ 提交</button>` : '';

                const html = `
                    <div class="top-bar">
                        <span class="score">🏅 ${score}</span>
                        <span class="remaining">⏳ 剩餘 ${remainingIndices.length+1} 題</span>
                    </div>
                    <div class="question-box">
                        <div class="q-text">${q.q}</div>
                        <div class="options" id="optionsContainer">${optsHtml}</div>
                        <div class="feedback-area">
                            <span class="answer-hint" id="answerHint">🔍 請作答</span>
                            <div style="display: flex;">
                                ${multiSubmitHtml}
                                <button class="next-btn hidden" id="nextBtn">⏩ 下一題</button>
                            </div>
                        </div>
                    </div>
                    <div style="text-align: center;">
                        <button class="restart-btn" id="restartBtn">⟲ 重新開始</button>
                    </div>
                `;

                container.innerHTML = html;

                // 繫結選項點擊
                document.querySelectorAll('.option').forEach(opt => {
                    opt.addEventListener('click', (e) => {
                        const letter = opt.dataset.letter;
                        if (!q.multi) {
                            handleSingleClick(letter, opt, q);
                        } else {
                            handleMultiClick(letter, opt, q);
                        }
                    });
                });

                // 多選提交按鈕
                if (q.multi && document.getElementById('submitMultiBtn')) {
                    document.getElementById('submitMultiBtn').addEventListener('click', () => submitMulti(q));
                }

                // 下一題按鈕 (剛開始隱藏)
                const nextBtn = document.getElementById('nextBtn');
                if (nextBtn) {
                    nextBtn.addEventListener('click', () => {
                        if (!answered) return; // 未作答不可前進 (保險)
                        const nextIdx = getNext();
                        if (nextIdx !== null) {
                            currentIdx = nextIdx;
                            renderQuestion(currentIdx);
                        } else {
                            renderFinish();
                        }
                    });
                }

                // 重新開始
                document.getElementById('restartBtn').addEventListener('click', restart);
            }

            // 初始化
            resetRemaining();
            const first = getNext();
            if (first !== null) {
                currentIdx = first;
                renderQuestion(currentIdx);
            } else {
                renderFinish();
            }
        })();
    </script>
</body>
</html>
